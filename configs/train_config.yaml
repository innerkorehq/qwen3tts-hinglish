# Qwen3-TTS-12Hz-1.7B-Base full fine-tune config
# Combined manifest: HiACC (adult + children, Hinglish) + OpenSLR-104 (Hindi-English, Bengali-English code-switched)
#
# In the single-A100 orchestrated flow (orchestrate.py), init_model_path,
# train_jsonl, and eval_jsonl are produced earlier in the SAME onstart script
# run (bootstrap downloads the base model to /root/work/models; build_manifest.py
# + encode_codes.py produce the data files under /root/work/data). All paths
# are relative to cwd=/root/work (on the instance's 250GB container disk).
#
# Training uses a hand-rolled `accelerate` loop (scripts/train.py) following
# the official finetuning reference
# (https://github.com/QwenLM/Qwen3-TTS/blob/main/finetuning/sft_12hz.py),
# NOT a HF Trainer. This is a general multi-speaker full fine-tune: the
# per-sample speaker embedding (from each record's own ref_audio, via
# model.speaker_encoder) is used during training as in the reference, but we
# do NOT bake a single global speaker embedding into codec_embedding[3000]
# ("custom_voice"/spk_id adaptation) at save time -- checkpoints stay loadable
# like the Base model with arbitrary --ref_audio at inference.
#
# Dataset size: ~141hrs total -> ~63k clips (at ~8s avg segment)
# Effective batch: 4 x 8 = 32 -> ~1,985 steps/epoch

model:
  init_model_path: ./models/Qwen3-TTS-12Hz-1.7B-Base
  output_model_path: ./checkpoints
  # "flash_attention_2" (used by the official reference) requires the
  # separately-installed `flash-attn` package, which bootstrap_vastai.sh does
  # not install. "sdpa" works out of the box on the A100 image.
  attn_implementation: flash_attention_2

data:
  train_jsonl: ./data/train_with_codes.jsonl
  eval_jsonl: ./data/eval_with_codes.jsonl

training:
  # --- Epochs ---
  # The first run (2 epochs) finished with eval_loss 5.3175 -- still far from
  # converged (random-guess cross-entropy over the 3072-way codec vocab is
  # ~8.0), and inference output was garbled/way too long (model not predicting
  # the codec EOS token at the right time). Extending to 6 epochs total.
  # Run with --resume: train.py picks up at epoch 2 (0-indexed) from the saved
  # accel_state/training_state.json, so this adds 4 more epochs on top of the
  # first run rather than restarting. The cosine LR schedule is recomputed for
  # the new total_epochs and "reheats" from where the previous run's schedule
  # ended, decaying to 0 by the new final epoch.
  num_epochs: 20

  # --- Batch size ---
  # effective = batch_size x gradient_accumulation_steps = 4 x 8 = 32
  # ~1,985 steps/epoch -> ~3,970 total steps over 2 epochs
  batch_size: 4
  gradient_accumulation_steps: 8

  # --- Learning rate ---
  # 1e-5 over 2 epochs left eval_loss at 5.3175 -- far from converged (random
  # guess over the 3072-way codec vocab is ~8.0) and inference output was
  # garbled. Bumping to 2e-5 for the remaining 4 epochs (6 total, via
  # --resume) to converge faster. train.py re-applies this lr on resume
  # (overriding the resumed optimizer/scheduler state, which was saved at
  # 1e-5) and the cosine schedule recomputed for num_epochs=6 reheats from
  # ~0 back to ~0.8x this lr at the current step, then decays to 0 over the
  # remaining epochs.
  lr: 2.0e-6
  lr_scheduler_type: cosine
  warmup_ratio: 0.05            # ~5% warmup over total steps

  # --- Regularization ---
  weight_decay: 0.01
  max_grad_norm: 1.0             # gradient clipping for training stability

  # --- Precision ---
  mixed_precision: bf16

  # --- Logging & eval ---
  logging_steps: 10
  # Eval runs once per epoch (over eval_jsonl) -- with only 2 epochs this is
  # frequent enough to catch overfitting; the best-eval epoch's checkpoint is
  # saved separately to ./checkpoints/best.

  # --- Data loading ---
  dataloader_num_workers: 4      # parallel data loading from container disk I/O
  dataloader_pin_memory: true

  # --- Reproducibility ---
  seed: 42

lora:
  # LoRA fine-tuning (recommended over full FT to avoid catastrophic forgetting).
  # Only ~2-5% of parameters are updated; base weights are frozen, preserving
  # the base model's English/Roman TTS capability while learning Hinglish.
  # Disable (enabled: false) to revert to full fine-tune.
  enabled: true
  r: 16
  lora_alpha: 32
  # Update attention + MLP projections inside the talker transformer.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  dropout: 0.05
  # At inference, merged LoRA checkpoints (final_fp32/final_bf16/best) are
  # plain model files with no peft dependency -- load exactly like the Base
  # model with arbitrary --ref_audio.

# Notes:
# - Container disk budget: see docs/RUNBOOK.md "Disk budget" for the full
#   breakdown. Per-epoch checkpoints are NOT accumulated -- only the latest
#   `accel_state/` (for --resume) and `best/` (best eval epoch) are kept on
#   disk, plus final_fp32/final_bf16/final at the end.
# - If OOM on 80GB A100: drop batch_size to 2 and raise
#   gradient_accumulation_steps to 16 (keeps effective batch size at 32).
# - Resuming: `python3 train.py --config ... --resume` picks up from
#   ./checkpoints/accel_state + training_state.json if present (see
#   docs/RUNBOOK.md "Resuming a failed run").
